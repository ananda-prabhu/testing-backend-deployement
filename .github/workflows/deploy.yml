name: Deploy App

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVERIP }}
          username: ${{ secrets.SERVERUSER }}
          key: ${{ secrets.SERVERSSHKEY }}
          script: |
            echo "Current user:"
            whoami

            echo "Current directory:"
            pwd

            echo "Root folders:"
            ls /

            echo "Apps folder:"
            ls /apps

            cd /apps/testing-backend-deployement

            echo "Inside repo:"
            pwd
            ls -la

            git status

            docker compose down
            docker compose up -d --build